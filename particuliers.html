  <style>
    :root {
      --bleu: #1a2a4a;
      --beige: #b8a98a;
      --blanc: #ffffff;
      --fond: #f7f5f1;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Jost',sans-serif; background:var(--fond); }

    /* HEADER */
    .page-header {
      background:var(--bleu);
      padding:1.5rem 3rem;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .back-btn {
      color:var(--beige);
      text-decoration:none;
      font-size:13px;
      letter-spacing:2px;
      text-transform:uppercase;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .back-btn:hover { color:#fff; }
    .page-header h1 {
      font-family:'Cormorant Garamond',serif;
      font-size:1.8rem;
      font-weight:300;
      color:#fff;
    }

    /* INTRO */
    .page-intro {
      padding:3rem;
      border-bottom:1px solid #ddd;
      background:#fff;
    }
    .page-intro h2 {
      font-family:'Cormorant Garamond',serif;
      font-size:2.5rem;
      font-weight:300;
      color:var(--bleu);
      margin-bottom:0.5rem;
    }
    .page-intro p {
      font-size:14px;
      color:#666;
      font-weight:300;
    }
    .slide-count {
      display:inline-block;
      background:var(--beige);
      color:#fff;
      font-size:11px;
      letter-spacing:2px;
      padding:4px 12px;
      margin-top:1rem;
      text-transform:uppercase;
    }

    /* GRID */
    .slides-grid {
      padding:2rem 2rem 4rem;
    }
    .slide-thumb {
      transition:transform .2s, box-shadow .2s;
    }
    .slide-thumb:hover {
      transform:scale(1.02);
      box-shadow:0 8px 32px rgba(0,0,0,.15);
      z-index:1;
      position:relative;
    }

    /* LIGHTBOX */
    .lightbox {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.93);
      z-index:9999;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }
    .lightbox.active { display:flex; }
    .lightbox img {
      max-width:92vw;
      max-height:82vh;
      object-fit:contain;
      border-radius:3px;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
    }
    .lightbox-label {
      color:#ccc;
      font-size:13px;
      margin-top:1rem;
      font-weight:300;
      letter-spacing:1px;
    }
    .lightbox-counter {
      color:var(--beige);
      font-size:12px;
      letter-spacing:2px;
      margin-top:6px;
    }
    .lb-close {
      position:fixed;
      top:20px; right:28px;
      color:#fff;
      font-size:2.5rem;
      cursor:pointer;
      opacity:.8;
      line-height:1;
    }
    .lb-close:hover { opacity:1; }
    .lb-prev, .lb-next {
      position:fixed;
      top:50%;
      transform:translateY(-50%);
      color:#fff;
      font-size:3rem;
      cursor:pointer;
      opacity:.6;
      padding:1rem;
      user-select:none;
    }
    .lb-prev:hover, .lb-next:hover { opacity:1; }
    .lb-prev { left:12px; }
    .lb-next { right:12px; }
  </style>
</head>

  <script>
    const slides = [
    {src: "images/particuliers-01-lexpertise-architecturale-sur-mesure.jpg", label: "L'Expertise Architecturale sur Mesure"},
    {src: "images/particuliers-02-penser-votre-espace-zone-dintervention.jpg", label: "Penser votre espace — Zone d'intervention"},
    {src: "images/particuliers-03-votre-projet-architectural-étape-par-éta.jpg", label: "Votre Projet Architectural, Étape par Étape"},
    {src: "images/particuliers-04-lart-de-concevoir.jpg", label: "L'Art de Concevoir"},
    {src: "images/particuliers-05-votre-vision-notre-expertise.jpg", label: "Votre vision, notre expertise"},
    {src: "images/particuliers-06-le-processus-de-conception-en-6-étapes.jpg", label: "Le Processus de Conception en 6 Étapes"},
    {src: "images/particuliers-07-01-recherche-foncière.jpg", label: "01 — Recherche Foncière"},
    {src: "images/particuliers-08-02-analyse-urbanistique.jpg", label: "02 — Analyse Urbanistique"},
    {src: "images/particuliers-09-03-lavant-projet-sommaire-apsadv.jpg", label: "03 — L'Avant-Projet Sommaire (APS/ADV)"},
    {src: "images/particuliers-10-04-aménagement-intérieur.jpg", label: "04 — Aménagement Intérieur"},
    {src: "images/particuliers-11-05-consultation-préventive.jpg", label: "05 — Consultation Préventive"},
    {src: "images/particuliers-12-laboutissement-du-projet-le-dossier-admi.jpg", label: "L'Aboutissement du Projet : Le Dossier Administratif"},
    {src: "images/particuliers-13-05-consultation-préventive-détail.jpg", label: "05 — Consultation Préventive (détail)"},
    {src: "images/particuliers-14-laboutissement-du-projet-suite.jpg", label: "L'Aboutissement du Projet (suite)"},
    {src: "images/particuliers-15-le-permis-de-construire-pc.jpg", label: "Le Permis de Construire (PC)"},
    {src: "images/particuliers-16-la-déclaration-préalable-dp.jpg", label: "La Déclaration Préalable (DP)"},
    {src: "images/particuliers-17-focus-pc-insertion-exigence-environnemen.jpg", label: "Focus PC : Insertion & Exigence Environnementale"},
    {src: "images/particuliers-18-06-plan-dexécution.jpg", label: "06 — Plan d'Exécution"},
    {src: "images/particuliers-19-synthèse-de-notre-accompagnement.jpg", label: "Synthèse de notre accompagnement"},
    {src: "images/particuliers-20-sécurité-technique-et-garanties.jpg", label: "Sécurité Technique et Garanties"},
    {src: "images/particuliers-21-guide-expert-dp-vs-pc.jpg", label: "Guide Expert : DP vs PC"},
    {src: "images/particuliers-22-au-delà-du-permis-aménagement-intérieur.jpg", label: "Au-delà du Permis : Aménagement Intérieur"},
    {src: "images/particuliers-23-réalisation-séjourcuisine.jpg", label: "Réalisation — Séjour/Cuisine"},
    {src: "images/particuliers-24-réalisation-salon.jpg", label: "Réalisation — Salon"},
    {src: "images/particuliers-25-réalisation-plan-3d.jpg", label: "Réalisation — Plan 3D"},
    {src: "images/particuliers-26-réalisation-suite-parentale.jpg", label: "Réalisation — Suite parentale"},
    {src: "images/particuliers-27-réalisation-chambre.jpg", label: "Réalisation — Chambre"},
    {src: "images/particuliers-28-réalisation-chambre-enfant.jpg", label: "Réalisation — Chambre enfant"},
    {src: "images/particuliers-29-réalisation-studio.jpg", label: "Réalisation — Studio"},
  ];
    let current = 0;

    function openLightbox(idx) {
      current = idx;
      showSlide();
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }
    function showSlide() {
      document.getElementById('lb-img').src = slides[current].src;
      document.getElementById('lb-img').alt = slides[current].label;
      document.getElementById('lb-label').textContent = slides[current].label;
      document.getElementById('lb-counter').textContent = (current+1) + ' / ' + slides.length;
    }
    function changeSlide(dir) {
      current = (current + dir + slides.length) % slides.length;
      showSlide();
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') changeSlide(1);
      if (e.key === 'ArrowLeft') changeSlide(-1);
      if (e.key === 'Escape') closeLightbox();
    });
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeLightbox();
    });
  </script>
