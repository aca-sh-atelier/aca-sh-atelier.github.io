<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bleu: #1a2a4a;
      --beige: #b8a98a;
      --blanc: #ffffff;
      --fond: #f7f5f1;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Jost',sans-serif; background:var(--fond); }

    /* INTRO */
    .page-intro {
      padding:3rem;
      border-bottom:1px solid #ddd;
      background:#fff;
    }
    .page-intro h2 {
      font-family:'Cormorant Garamond',serif;
      font-size:2.5rem;
      font-weight:300;
      color:var(--bleu);
      margin-bottom:0.5rem;
    }
    .page-intro p {
      font-size:14px;
      color:#666;
      font-weight:300;
    }
    .slide-count {
      display:inline-block;
      background:var(--beige);
      color:#fff;
      font-size:11px;
      letter-spacing:2px;
      padding:4px 12px;
      margin-top:1rem;
      text-transform:uppercase;
    }

    /* GRID */
    .slides-grid { padding:2rem 2rem 4rem; }
    .slide-thumb { transition:transform .2s, box-shadow .2s; }
    .slide-thumb:hover {
      transform:scale(1.02);
      box-shadow:0 8px 32px rgba(0,0,0,.15);
      z-index:1;
      position:relative;
    }

    /* LIGHTBOX */
    .lightbox {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.93);
      z-index:9999;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }
    .lightbox.active { display:flex; }
    .lightbox img {
      max-width:92vw;
      max-height:82vh;
      object-fit:contain;
      border-radius:3px;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
    }
    .lightbox-label {
      color:#ccc;
      font-size:13px;
      margin-top:1rem;
      font-weight:300;
      letter-spacing:1px;
    }
    .lightbox-counter {
      color:var(--beige);
      font-size:12px;
      letter-spacing:2px;
      margin-top:6px;
    }
    .lb-close {
      position:fixed;
      top:20px; right:28px;
      color:#fff;
      font-size:2.5rem;
      cursor:pointer;
      opacity:.8;
      line-height:1;
    }
    .lb-close:hover { opacity:1; }
    .lb-prev, .lb-next {
      position:fixed;
      top:50%;
      transform:translateY(-50%);
      color:#fff;
      font-size:3rem;
      cursor:pointer;
      opacity:.6;
      padding:1rem;
      user-select:none;
    }
    .lb-prev:hover, .lb-next:hover { opacity:1; }
    .lb-prev { left:12px; }
    .lb-next { right:12px; }
  </style>
</head>
<body>

<div class="page-intro">

  <p>Toutes les étapes de votre projet architectural — cliquez sur une slide pour l'agrandir.</p>
  <span class="slide-count">22 slides · Cliquer pour agrandir</span>
</div>

    <img src="images/particuliers-hero-02.jpg" alt="Penser votre espace. Prenons du temps." class="slide-thumb" style="width:100%;display:block;border-radius:2px;cursor:zoom-in;" onclick="openLightbox(1)">
    <img src="images/particuliers-hero-03.jpg" alt="Votre vision, notre expertise architecturale" class="slide-thumb" style="width:100%;display:block;border-radius:2px;cursor:zoom-in;" onclick="openLightbox(2)">
  </div>

  <!-- Rangée 2 : 3 colonnes -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;">
    <img src="images/particuliers-hero-04.jpg" alt="Le Processus de Conception en 7 Étapes" class="slide-thumb" style="width:100%;display:block;border-radius:2px;cursor:zoom-in;" onclick="openLightbox(3)">
    <img src="images/particuliers-hero-05.jpg" alt="01 — Recherche Foncière : La base de votre projet" class="slide-thumb" style="width:100%;display:block;border-radius:2px;cursor:zoom-in;" onclick="openLightbox(4)">
    <img src="images/particuliers-hero-06.jpg" alt="02 — Analyse Urbanistique et Réglementaire" class="slide-thumb" style="width:100%;display:block;border-radius:2px;cursor:zoom-in;" onclick="openLightbox(5)">

    <img src="images/particuliers-hero-08.jpg" alt="04 — Aménagement Intérieur" class="slide-thumb" style="width:100%;display:block;border-radius:2px;cursor:zoom-in;" onclick="openLightbox(7)">
    <img src="images/particuliers-hero-09.jpg" alt="05 — Consultation Préventive" class="slide-thumb" style="width:100%;display:block;border-radius:2px;cursor:zoom-in;" onclick="openLightbox(8)">

  </div>

  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px;">
    <img src="images/particuliers-hero-21.jpg" alt="Réalisation — Studio / Bureau" class="slide-thumb" style="width:100%;display:block;border-radius:2px;cursor:zoom-in;" onclick="openLightbox(20)">
    <img src="images/particuliers-hero-22.jpg" alt="Réalisation — Chambre enfant" class="slide-thumb" style="width:100%;display:block;border-radius:2px;cursor:zoom-in;" onclick="openLightbox(21)">

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="lb-close" onclick="closeLightbox()">×</span>
  <span class="lb-prev" onclick="changeSlide(-1)">&#8249;</span>
  <img id="lb-img" src="" alt="">
  <div class="lightbox-label" id="lb-label"></div>
  <div class="lightbox-counter" id="lb-counter"></div>
  <span class="lb-next" onclick="changeSlide(1)">&#8250;</span>
</div>

<script>
  const slides = [
    {src:"images/particuliers-hero-01.jpg", label:"L'Expertise Architecturale sur Mesure pour les Particuliers"},
    {src:"images/particuliers-hero-02.jpg", label:"Penser votre espace. Prenons du temps."},
    {src:"images/particuliers-hero-03.jpg", label:"Votre vision, notre expertise architecturale"},
    {src:"images/particuliers-hero-04.jpg", label:"Le Processus de Conception en 7 Étapes"},
    {src:"images/particuliers-hero-05.jpg", label:"01 — Recherche Foncière : La base de votre projet"},
    {src:"images/particuliers-hero-06.jpg", label:"02 — Analyse Urbanistique et Réglementaire"},
    {src:"images/particuliers-hero-07.jpg", label:"03 — L'Avant-Projet Sommaire (APS / ADV)"},
    {src:"images/particuliers-hero-08.jpg", label:"04 — Aménagement Intérieur"},
    {src:"images/particuliers-hero-09.jpg", label:"05 — Consultation Préventive"},
    {src:"images/particuliers-hero-10.jpg", label:"06 — Composition d'un Dossier de Permis de Construire (PCMI) Complet"},
    {src:"images/particuliers-hero-11.jpg", label:"07 — Plan d'Exécution : La précision millimétrée"},
    {src:"images/particuliers-hero-12.jpg", label:"Focus PC : Insertion & Exigence Environnementale"},
    {src:"images/particuliers-hero-13.jpg", label:"Sécurité Technique et Garanties"},
    {src:"images/particuliers-hero-14.jpg", label:"Guide Expert : Choisir entre DP et PC"},
    {src:"images/particuliers-hero-15.jpg", label:"Au-delà du Permis : Votre Projet d'Aménagement Intérieur"},
    {src:"images/particuliers-hero-16.jpg", label:"Réalisation — Séjour / Salle à manger"},
    {src:"images/particuliers-hero-17.jpg", label:"Réalisation — Salon"},
    {src:"images/particuliers-hero-18.jpg", label:"Réalisation — Plan 3D"},
    {src:"images/particuliers-hero-19.jpg", label:"Réalisation — Suite parentale"},
    {src:"images/particuliers-hero-20.jpg", label:"Réalisation — Chambre"},
    {src:"images/particuliers-hero-21.jpg", label:"Réalisation — Studio / Bureau"},
    {src:"images/particuliers-hero-22.jpg", label:"Réalisation — Chambre enfant"},
  ];
  let current = 0;

  function openLightbox(idx) {
    current = idx;
    showSlide();
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }
  function showSlide() {
    document.getElementById('lb-img').src = slides[current].src;
    document.getElementById('lb-img').alt = slides[current].label;
    document.getElementById('lb-label').textContent = slides[current].label;
    document.getElementById('lb-counter').textContent = (current+1) + ' / ' + slides.length;
  }
  function changeSlide(dir) {
    current = (current + dir + slides.length) % slides.length;
    showSlide();
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') changeSlide(1);
    if (e.key === 'ArrowLeft')  changeSlide(-1);
    if (e.key === 'Escape')     closeLightbox();
  });
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeLightbox();
  });
</script>

</body>
</html>
